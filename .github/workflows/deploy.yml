name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Prisma validate/generate requires DATABASE_URL to be present,
      # but does not need a live DB connection for these commands.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uniplay?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma generate
        run: npx prisma generate

      - name: Run tests
        run: npm test --if-present

      - name: Lint
        run: npm run lint

